<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            width: 220px;
            padding: 16px;
            font-family: sans-serif;
        }

        h3 {
            margin: 0 0 12px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 8px;
            font-size: 13px;
            background: #1a56db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1447b8;
        }

        #status {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <h3>YT Quiz AI</h3>
    <button id="open-quiz">Open Quiz</button>
    <div id="status"></div>
    <script src="popup.js"></script>
</body>

</html>
